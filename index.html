<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="PadelRanks — privacy policy and terms of service." />
<title>PadelRanks — Legal</title>
<style>
  :root {
    --accent: #C5F947;
    --text: #F1F5F0;
    --muted: #9AA39A;
    --bg: #0A0F0D;
    --surface: #141A17;
    --light: #1F2A24;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    margin: 0;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  main { flex: 1; max-width: 560px; margin: 0 auto; padding: 64px 24px; width: 100%; }
  .badge {
    display: inline-flex; align-items: center; justify-content: center;
    width: 64px; height: 64px; border-radius: 18px;
    background: rgba(197, 249, 71, 0.10);
    border: 1px solid rgba(197, 249, 71, 0.32);
    margin-bottom: 24px;
  }
  .badge svg { width: 36px; height: 36px; }
  h1 { font-size: 36px; font-weight: 800; margin: 0 0 8px; letter-spacing: -0.5px; }
  .sub { color: var(--muted); font-size: 16px; margin: 0 0 40px; }
  .links { display: grid; gap: 12px; }
  .link {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 20px; background: var(--surface);
    border: 1px solid var(--light); border-radius: 14px;
    color: var(--text); text-decoration: none;
    font-size: 16px; font-weight: 600;
  }
  .link:hover { border-color: var(--accent); }
  .link .arrow { color: var(--accent); font-size: 18px; }
  .link .desc { font-size: 13px; color: var(--muted); font-weight: 400; margin-top: 2px; }
  footer {
    text-align: center; color: #6B7670; font-size: 13px;
    padding: 24px; border-top: 1px solid var(--light);
  }
  footer a { color: var(--accent); }
</style>
</head>
<body>
<main>
  <div class="badge">
    <svg viewBox="0 0 140 140" xmlns="http://www.w3.org/2000/svg">
      <path d="M 70 8 Q 128 8 128 72 Q 128 130 70 130 Q 12 130 12 72 Q 12 8 70 8 Z" fill="#C5F947" stroke="#0A0F0D" stroke-width="4"/>
      <circle cx="50" cy="55" r="5" fill="#0A0F0D"/>
      <circle cx="70" cy="55" r="5" fill="#0A0F0D"/>
      <circle cx="90" cy="55" r="5" fill="#0A0F0D"/>
      <circle cx="50" cy="80" r="5" fill="#0A0F0D"/>
      <circle cx="70" cy="80" r="5" fill="#0A0F0D"/>
      <circle cx="90" cy="80" r="5" fill="#0A0F0D"/>
    </svg>
  </div>
  <h1>PadelRanks</h1>
  <p class="sub">Legal documents for the PadelRanks app.</p>

  <div class="links">
    <a class="link" href="./privacy-policy.html">
      <span>
        Privacy Policy
        <div class="desc">How we handle your data &mdash; short version: we don't.</div>
      </span>
      <span class="arrow">&rarr;</span>
    </a>
    <a class="link" href="./terms.html">
      <span>
        Terms of Service
        <div class="desc">Rules for using PadelRanks.</div>
      </span>
      <span class="arrow">&rarr;</span>
    </a>
  </div>
</main>
<footer>&copy; 2026 PadelRanks</footer>
</body>
</html>
